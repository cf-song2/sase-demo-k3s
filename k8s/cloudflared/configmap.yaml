apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflared-config
  namespace: demo
data:
  config.yaml: |
    tunnel: YOUR_TUNNEL_ID
    credentials-file: /etc/cloudflared/credentials.json
    
    ingress:
      - hostname: web-demo.example.com
        service: http://web.demo.svc.cluster.local:80
      - service: http_status:404
